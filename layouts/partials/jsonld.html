{{ if .IsHome -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ site.Title | htmlUnescape | jsonify | safeHTML }},
  "url": {{ site.BaseURL | jsonify | safeHTML }},
  "description": {{ site.Params.description | jsonify | safeHTML }},
  "author": {
    "@type": "Person",
    "name": {{ site.Params.author | jsonify | safeHTML }}
  }
}
</script>
{{- else if eq .Type "posts" -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | htmlUnescape | jsonify | safeHTML }},
  "url": {{ .Permalink | jsonify | safeHTML }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify | safeHTML }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify | safeHTML }},
  "description": {{ (or .Description .Summary) | plainify | htmlUnescape | jsonify | safeHTML }},
  {{ with .Params.cover -}}
  "image": {{ . | absURL | jsonify | safeHTML }},
  {{- end }}
  "author": {
    "@type": "Person",
    "name": {{ if isset $.Params "author" }}{{ $.Params.author | jsonify | safeHTML }}{{ else }}{{ site.Params.author | jsonify | safeHTML }}{{ end }}
  },
  "publisher": {
    "@type": "Person",
    "name": {{ site.Params.author | jsonify | safeHTML }}
  }
}
</script>
{{- end }}
